<!DOCTYPE html> 
<html lang="id"> 
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Jadwal Piket</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  background: #fdf8f5; 
  font-family: 'Poppins', sans-serif;
  padding: 10px; 
} 

h2 {
  font-weight: 600;
  color: #5c3d2e;
}

.card {
  border-radius: 20px;
  border: none; 
  box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
  cursor: pointer; 
  transition: 0.2s;
} 

.card:hover { 
  transform: scale(1.02); 
} 

.hari {
  font-weight: 600;
  font-size: 18px;
  color: #5c3d2e; 
} 
</style>

</head> 

<body> 

<script> 
if (!localStorage.getItem("login")) { 
  window.location.href = "index.html"; 
}
</script>

<div class="container mt-4">
  <h2>Jadwal Piket</h2>
  <div id="jadwalList"></div> 
</div>

<script type="module">

import { createClient } 
from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"; 

const supabase = createClient(
  "https://lfruadqggiugakpfhwph.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmcnVhZHFnZ2l1Z2FrcGZod3BoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MDQ2MzQsImV4cCI6MjA5MTQ4MDYzNH0.K6ewi__8XseiRbF98Vhs_jp-DscaSO43BQUblfRZVao"
);

// 🔐 ANTI TEMBAK (POSISI SUDAH BENAR)
const { data: { user } } = await supabase.auth.getUser();
if (!user) {
  window.location.href = "index.html";
}

async function tampilJadwal() {

  const { data, error } = await supabase.from("jadwal").select("*");

  console.log("DATA:", data);
  console.log("ERROR:", error);

  const list = document.getElementById("jadwalList");
  list.innerHTML = "";

  if (error) {
    list.innerHTML = "<p>Gagal ambil data 😢</p>";
    return;
  }

  if (!data || data.length === 0) {
    list.innerHTML = "<p>Tidak ada data jadwal</p>";
    return;
  }

  data.forEach(item => {
    list.innerHTML += `
      <div class="card p-3 mb-3" onclick="bukaHalaman(\`${item.hari}\`)">
        <div class="hari">${item.hari}</div>
        <div>${item.nama}</div>
      </div>
    `;
  });
}

window.bukaHalaman = (hari) => {
  const user = localStorage.getItem("login");

  if (user === "admin@gmail.com") {
    window.location.href = "admin.html?hari=" + hari;
  } else {
    window.location.href = "user.html?hari=" + hari;
  }
};

tampilJadwal();

</script> 

</body> 
</html>
