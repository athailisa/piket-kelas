<!DOCTYPE html>
<html>
<head>
  <title>Admin Page</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/feather-icons"></script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13"></script>

  <style>
    body { 
      background:#fdf8f5;
      font-family:Poppins;
      padding:10px;
         }
    .card { 
      border-radius:20px;
       border:none;
        box-shadow:0 10px 25px rgba(0,0,0,0.05);
       }
    img {
       width:100%;
        max-width:250px;
         border-radius:10px; 
         cursor:pointer; 
        }
    .header {
       display:flex; 
       justify-content:space-between; 
       flex-wrap:wrap;
        gap:10px; 
      }

    .btn-icon {
      display:flex;
      align-items:center;
      gap:6px;
      font-size:14px;
    }

    button svg {
      width:16px;
      height:16px;
    }
  </style>
</head>

<body>

<div class="container mt-4">

  <div class="header mb-3">
    <h2 class="fw-bold">Admin Page</h2>
    <button onclick="logout()" class="btn btn-danger btn-icon">
      <i data-feather="log-out"></i> Logout
    </button>
  </div>

  <!-- FORM -->
  <div class="card p-4 mb-4">
    <input id="nama" class="form-control mb-2" placeholder="Nama siswa">
    <input id="tanggal" class="form-control mb-2" placeholder="Tanggal">

    <select id="status" class="form-select mb-2">
      <option>Bersih</option>
      <option>Kotor</option>
    </select>

    <input id="catatan" class="form-control mb-2" placeholder="Catatan">
    <input id="foto" type="file" class="form-control mb-3">

    <button onclick="tambahData()" class="btn btn-success w-100 d-flex align-items-center justify-content-center gap-2">
  <i data-feather="plus-circle"></i>
  <span>Tambah Data</span>
   </button>
  </div>

  <h5>Total: <span id="total">0</span></h5>

  <div id="list"></div>
</div>

<!-- MODAL -->
<div class="modal fade" id="zoomModal">
  <div class="modal-dialog modal-dialog-centered modal-xl">
    <div class="modal-content bg-dark">
      <div class="modal-body text-center p-0">
        <img id="zoomImg" style="width:100%; max-height:90vh;">
      </div>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://lfruadqggiugakpfhwph.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmcnVhZHFnZ2l1Z2FrcGZod3BoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MDQ2MzQsImV4cCI6MjA5MTQ4MDYzNH0.K6ewi__8XseiRbF98Vhs_jp-DscaSO43BQUblfRZVao"
);

// LOGIN CHECK
setTimeout(async () => {
  const { data: { user } } = await supabase.auth.getUser();

  if (!user) return window.location.replace("./index.html");
  if (user.email !== "admin@gmail.com") return window.location.replace("./user.html");

  tampil();
}, 500);

// LOAD DATA
async function tampil() {
  const { data } = await supabase.from("piket").select("*");

  document.getElementById("total").innerText = data.length;

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(item => {
    list.innerHTML += `
      <div class="card p-3 mb-2">
        <b>${item.nama}</b><br>
        <small>${item.status}</small><br>

        ${item.foto ? `<img src="${item.foto}" onclick="zoomFoto('${item.foto}')">` : ""}

        <div class="mt-2 d-flex gap-2">

          <button class="btn btn-sm btn-success btn-icon"
            onclick="editData('${item.id}')">
            <i data-feather="edit"></i> Edit
          </button>

          <button class="btn btn-sm btn-danger btn-icon"
            onclick="hapus('${item.id}')">
            <i data-feather="trash-2"></i> Hapus
          </button>

        </div>
      </div>
    `;
  });

  feather.replace();
}

// TAMBAH / EDIT
window.tambahData = async () => {
  const nama = document.getElementById("nama").value;
  const tanggal = document.getElementById("tanggal").value;
  const status = document.getElementById("status").value;
  const catatan = document.getElementById("catatan").value;
  const file = document.getElementById("foto").files[0];

  if (!nama || !tanggal) return alert("Isi lengkap!");

  const parts = tanggal.split("/");
  const iso = `${parts[2]}-${parts[1]}-${parts[0]}`;

  let url = null;

  if (file) {
    const fileName = Date.now() + "_" + file.name;

    const { error } = await supabase.storage.from("foto").upload(fileName, file);

    if (!error) {
      const { data } = supabase.storage.from("foto").getPublicUrl(fileName);
      url = data.publicUrl;
    }
  }

  const payload = { nama, tanggal: iso, status, catatan };
  if (url) payload.foto = url;

  if (window.editId) {
    await supabase.from("piket").update(payload).eq("id", window.editId);
    window.editId = null;
  } else {
    await supabase.from("piket").insert([payload]);
  }

  resetForm();
  tampil();
};

// EDIT
window.editData = async (id) => {
  const { data } = await supabase.from("piket").select("*").eq("id", id).single();

  document.getElementById("nama").value = data.nama;
  document.getElementById("tanggal").value = data.tanggal;
  document.getElementById("status").value = data.status;
  document.getElementById("catatan").value = data.catatan;

  window.editId = id;
};

// HAPUS
window.hapus = async (id) => {
  await supabase.from("piket").delete().eq("id", id);
  tampil();
};

// RESET
function resetForm() {
  document.getElementById("nama").value = "";
  document.getElementById("tanggal").value = "";
  document.getElementById("catatan").value = "";
  document.getElementById("foto").value = "";
}

// ZOOM
window.zoomFoto = (src) => {
  document.getElementById("zoomImg").src = src;
  new bootstrap.Modal(document.getElementById("zoomModal")).show();
};

// LOGOUT
window.logout = async () => {
  await supabase.auth.signOut();
  window.location.replace("./index.html");
};

flatpickr("#tanggal", { dateFormat: "d/m/Y" });

feather.replace();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
