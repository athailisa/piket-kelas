<!DOCTYPE html>
<html>
<head>
  <title>Admin Page</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/feather-icons"></script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13"></script>

  <style>
    body { 
      background:#fdf8f5;
      font-family:Poppins;
      padding:10px;
    }
    .card { 
      border-radius:20px;
      border:none;
      box-shadow:0 10px 25px rgba(0,0,0,0.05);
    }

        .bersih {
      background: #e6f4ea;
      color: #2e7d32;
      padding: 5px 10px;
      border-radius: 10px;
    }

    .kotor {
      background: #fdecea;
      color: #c62828;
      padding: 5px 10px;
      border-radius: 10px;
    }

   img {
      width: 100%;
      max-width: 250px;
      height: auto;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    img:hover {
      transform: scale(1.02);
    }
    .header {
      display:flex; 
      justify-content:space-between; 
      flex-wrap:wrap;
      gap:10px; 
    }

    .btn-icon {
      display:flex;
      align-items:center;
      gap:6px;
      font-size:14px;
    }

    button svg {
      width:16px;
      height:16px;
    }
    .modal-img { max-width: 100%; }
  </style>
</head>

<body>

<script>
// Check login
if (!localStorage.getItem("login")) {
  window.location.href = "index.html";
}
</script>

<div class="container mt-4">

  <div class="header mb-3">
    <h2 class="fw-bold">Admin Page</h2>
    <button onclick="showLogoutModal()" class="btn btn-danger btn-icon">
      <i data-feather="log-out"></i> Logout
    </button>
  </div>

  <div class="card p-4 mb-4">
    <input id="nama" class="form-control mb-2" placeholder="Nama siswa">
    <input id="tanggal" class="form-control mb-2" placeholder="Tanggal">

    <select id="status" class="form-select mb-2">
      <option>Bersih</option>
      <option>Kotor</option>
    </select>

    <input id="catatan" class="form-control mb-2" placeholder="Catatan">
    <input id="foto" type="file" class="form-control mb-3">

    <button onclick="tambahData()" class="btn btn-success w-100 d-flex align-items-center justify-content-center gap-2">
      <i data-feather="plus-circle"></i>
      <span>Tambah Data</span>
    </button>
  </div>

  <div class="card p-3 mb-4">
    <div class="d-flex justify-content-between">
      <p class="mb-1">Progress Kebersihan</p>
      <p class="mb-1" id="persenText">0%</p>
    </div>
    <div class="progress">
      <div id="progressBar" class="progress-bar bg-primary"></div>
    </div>
  </div>

  <h5>Total: <span id="total">0</span></h5>

  <div id="list"></div>
</div>

<div class="modal fade" id="zoomModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content bg-dark">
      <div class="modal-body text-center p-2">
        <img id="zoomImg" style="max-width:100%; max-height:80vh;">
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="logoutModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content py-4 px-3 text-center">
      <h5 class="mb-4">
        <i data-feather="alert-triangle"></i> Yakin mau logout?
      </h5>

      <div class="d-flex justify-content-center gap-2">
        <button class="btn btn-success" data-bs-dismiss="modal">
          Tidak
        </button>

        <button class="btn btn-danger" onclick="confirmLogout()">
          Ya, Logout
        </button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
const params = new URLSearchParams(window.location.search);
const hariDipilih = params.get("hari");

if (hariDipilih) {
  document.getElementById("tanggal").value = hariDipilih;
}

const supabase = createClient(
  "https://lfruadqggiugakpfhwph.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmcnVhZHFnZ2l1Z2FrcGZod3BoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MDQ2MzQsImV4cCI6MjA5MTQ4MDYzNH0.K6ewi__8XseiRbF98Vhs_jp-DscaSO43BQUblfRZVao"
);

setTimeout(async () => {
  const { data: { user } } = await supabase.auth.getUser();

  if (!user) return window.location.replace("./index.html");
  if (user.email !== "admin@gmail.com") return window.location.replace("./user.html");

  tampil();
}, 500);

async function tampil() {
  const { data } = await supabase.from("piket").select("*");

  document.getElementById("total").innerText = data.length;

  const list = document.getElementById("list");
  list.innerHTML = "";

  let bersih = 0;

  data.forEach(item => {

    if (item.status === "Bersih") bersih++;

    list.innerHTML += `
      <div class="card p-3 mb-2">
        <b>${item.nama}</b><br>
        
      <span class="${item.status==='Bersih'?'bersih':'kotor'}">
          <i data-feather="${item.status==='Bersih'?'check':'x'}"></i>
          ${item.status}
        </span>

         ${item.foto ? `<img src="${item.foto}" class="mt-2" onclick="zoomFoto('${item.foto}')">` : ""}

        <div class="mt-2 d-flex gap-2">

          <button class="btn btn-sm btn-success btn-icon"
            onclick="editData('${item.id}')">
            <i data-feather="edit"></i> Edit
          </button>

          <button class="btn btn-sm btn-danger btn-icon"
            onclick="hapus('${item.id}')">
            <i data-feather="trash-2"></i> Hapus
          </button>

        </div>
      </div>
    `;
  });

  let total = data.length;
  let persen = total ? (bersih / total) * 100 : 0;

  document.getElementById("progressBar").style.width = persen + "%";
  document.getElementById("persenText").innerText = Math.round(persen) + "%";

  feather.replace();
}

window.tambahData = async () => {
  const nama = document.getElementById("nama").value;
  const tanggal = document.getElementById("tanggal").value;
  const status = document.getElementById("status").value;
  const catatan = document.getElementById("catatan").value;
  const file = document.getElementById("foto").files[0];

  if (!nama || !tanggal) return alert("Isi lengkap!");

  const parts = tanggal.split("/");
  const iso = `${parts[2]}-${parts[1]}-${parts[0]}`;

  let url = null;

  if (file) {
    const fileName = Date.now() + "_" + file.name;

    const { error } = await supabase.storage.from("foto").upload(fileName, file);

    if (!error) {
      const { data } = supabase.storage.from("foto").getPublicUrl(fileName);
      url = data.publicUrl;
    }
  }

  const payload = { nama, tanggal: iso, status, catatan };
  if (url) payload.foto = url;

  if (window.editId) {
    await supabase.from("piket").update(payload).eq("id", window.editId);
    window.editId = null;
  } else {
    await supabase.from("piket").insert([payload]);
  }

  resetForm();
  tampil();
};

window.editData = async (id) => {
  const { data } = await supabase.from("piket").select("*").eq("id", id).single();

  document.getElementById("nama").value = data.nama;
  document.getElementById("tanggal").value = data.tanggal;
  document.getElementById("status").value = data.status;
  document.getElementById("catatan").value = data.catatan;

  window.editId = id;
};

window.hapus = async (id) => {
  await supabase.from("piket").delete().eq("id", id);
  tampil();
};

function resetForm() {
  document.getElementById("nama").value = "";
  document.getElementById("tanggal").value = "";
  document.getElementById("catatan").value = "";
  document.getElementById("foto").value = "";
}

window.zoomFoto = (src) => {
  document.getElementById("zoomImg").src = src;
  const modal = new bootstrap.Modal(document.getElementById('zoomModal'));
  modal.show();
};

window.showLogoutModal = () => {
  new bootstrap.Modal(document.getElementById('logoutModal')).show();
};

window.confirmLogout = async () => {
  await supabase.auth.signOut();
  localStorage.removeItem("login");
  window.location.replace("./index.html");
};

flatpickr("#tanggal", { dateFormat: "d/m/Y" });

supabase
  .channel('piket-channel')
  .on('postgres_changes', {
    event: '*',
    schema: 'public',
    table: 'piket'
  }, () => {
    tampil();
  })
  .subscribe();

feather.replace();
</script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
