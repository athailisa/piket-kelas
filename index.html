<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column; /* tambahan biar atas + card bisa rapi */
      justify-content: center;
      align-items: center;
      padding: 20px; 
      background: linear-gradient(135deg, #fdf8f5, #f1e3d3);
      font-family: 'Poppins', sans-serif;
    }

    .card {
      width: 100%;
      max-width: 380px;
      border-radius: 20px;
      border: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      padding: 30px;
      animation: fadeIn 0.6s ease;
    }

    h3 {
      font-weight: 600;
      color: #5c3d2e;
    }

    .form-control {
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
    }

    .btn-primary {
      background: #5c3d2e;
      border: none;
      border-radius: 10px;
      font-weight: 500;
      padding: 10px;
    }

    .btn-primary:hover {
      background: #4a2f23;
    }

    .btn-outline-secondary {
      border-radius: 10px;
      padding: 10px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .card {
        padding: 20px;
        border-radius: 15px;
      }

      h3 {
        font-size: 20px;
      }

      .form-control {
        font-size: 13px;
        padding: 10px;
      }
    }
  </style>
</head>

<body>

<!-- 🔥 DIUBAH: TIDAK MELENGKUNG + DIBESARKAN -->
<div class="text-center mb-3">
  <h2 style="font-weight:600; color:#5c3d2e; font-size:30px;">
    Jadwal Piket
  </h2>
</div>
 
<div class="card">
  <h3 class="text-center mb-4">Login </h3>

  <input id="email" class="form-control mb-3" placeholder="Email">
  <input id="password" type="password" class="form-control mb-3" placeholder="Password">

  <button id="loginBtn" class="btn btn-primary w-100 mb-2">Login</button>
  <button id="registerBtn" class="btn btn-outline-secondary w-100">Register</button>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://lfruadqggiugakpfhwph.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmcnVhZHFnZ2l1Z2FrcGZod3BoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MDQ2MzQsImV4cCI6MjA5MTQ4MDYzNH0.K6ewi__8XseiRbF98Vhs_jp-DscaSO43BQUblfRZVao"
);

document.getElementById("registerBtn").onclick = async () => {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  const { error } = await supabase.auth.signUp({ email, password });

  if (error) return alert(error.message);
  alert("Register berhasil!");
};

document.getElementById("loginBtn").onclick = async () => {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) return alert("Email / Password salah !");

  localStorage.setItem("login", data.user.email);

 
    window.location.href = "jadwal.html";
};
</script>

</body>
</html>
